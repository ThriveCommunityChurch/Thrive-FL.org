name: Build Check

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Add any required environment variables here
          NODE_ENV: production

      - name: Build success
        if: success()
        run: echo "Build completed successfully!"

      - name: Build failed
        if: failure()
        run: echo "Build failed. Please fix the errors before merging."

